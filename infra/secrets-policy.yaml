secrets_policy:
  storage:
    allowed:
      - managed_secret_store
    disallowed:
      - git_repository
      - plaintext_env_files
  required_classes:
    - provider_access_tokens
    - signing_keys
    - service_credentials
  rotation:
    default_interval_days: 90
    high_sensitivity_interval_days: 30
  controls:
    enforce_least_privilege: true
    require_audit_trail: true
    require_access_review: true
  incident_response:
    revoke_on_exposure: true
    rotate_on_exposure: true
    open_security_incident: true
